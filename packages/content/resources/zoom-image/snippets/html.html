<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zoom Image</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="zoom-container">
        <div class="zoom-img-wrapper" id="magnifier-target">
            <img src="https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=1200&q=90" alt="Product Zoom" />
            <div id="magnifier-lens" class="magnifier-lens"></div>
        </div>
        <div id="magnifier-result" class="magnifier-result"></div>
    </div>

    <script src="script.js"></script>
</body>

</html>
